*{box-sizing:border-box;margin:0;padding:0;}
:root{

.header{background:#0f1f35;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header-logo{width:56px;height:56px;object-fit:contain;flex-shrink:0;}
.header-info{flex:1;}
.header-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.header-title span{color:#f97316;}
.header-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;}

/* HERO */
.hero{padding:36px 20px;background:linear-gradient(135deg,#0f1f35 0%,#1a3a5c 60%,#1a6fd4 100%);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(249,115,22,.15),transparent 70%);border-radius:50%;}
.hero-content{position:relative;z-index:1;max-width:640px;}
.hero h1{font-size:30px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px;}
.hero p{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:18px;line-height:1.6;}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;}
.hero-badge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;}

/* BODY */
.body{padding:24px 20px;max-width:1100px;margin:0 auto;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;background:#fff;border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:12px 16px 12px 44px;font-size:14px;font-family:'Outfit',sans-serif;box-shadow:var(--shadow);transition:border .15s;}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,111,212,.1);}
.search-input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}

/* FILTERS */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.chip{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);transition:all .15s;box-shadow:var(--shadow);}
.chip.active,.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;}
.prod-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);overflow:hidden;}
.prod-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.prod-card:active{transform:translateY(-1px);}
.prod-img{width:100%;height:150px;object-fit:cover;background:var(--bg3);display:block;}
.prod-img-placeholder{width:100%;height:150px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:36px;}
.prod-body{padding:14px;}
.prod-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;color:var(--text);}
.prod-cat{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500;}
.prod-price{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent);}
.prod-stock{font-size:11px;color:var(--text3);margin-top:3px;}

/* DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,31,53,.65);z-index:300;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.detail-sheet{background:#fff;border-radius:24px 24px 0 0;padding:0 0 36px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:16px auto 0;}
.sheet-close{position:absolute;top:12px;right:16px;background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* MEDIA GALLERY */
.media-gallery{width:100%;background:var(--bg3);overflow:hidden;position:relative;}
.media-main{width:100%;height:240px;object-fit:cover;display:block;}
.media-main-video{width:100%;height:240px;object-fit:cover;display:block;}
.media-main-placeholder{width:100%;height:240px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:56px;}
.media-thumbs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);}
.media-thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border .15s;}
.media-thumb.active{border-color:var(--accent);}
.media-thumb-video{width:52px;height:52px;border-radius:8px;cursor:pointer;border:2px solid transparent;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;transition:border .15s;}
.media-thumb-video.active{border-color:var(--accent);}

.detail-body{padding:20px 20px 0;position:relative;}
.detail-cat{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.detail-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3;}
.detail-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px;padding:12px 14px;background:var(--bg3);border-radius:10px;}
.detail-price{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;color:var(--accent);margin-bottom:4px;}
.detail-stock{font-size:12px;color:var(--text3);margin-bottom:20px;font-weight:500;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:#16a34a;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 12px rgba(22,163,74,.3);}
.wa-btn:hover{background:#15803d;transform:translateY(-1px);}
.wa-btn:active{transform:scale(.98);}

/* FAB */
.fab-wa{position:fixed;bottom:24px;right:20px;background:#16a34a;color:#fff;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.4);transition:all .15s;border:none;z-index:40;}
.fab-wa:hover{background:#15803d;transform:scale(1.08);}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RESPONSIVE */
@media(max-width:600px){
  .hero{padding:24px 16px;}
  .hero h1{font-size:22px;}
  .body{padding:16px 14px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .media-main,.media-main-video,.media-main-placeholder{height:200px;}
  .detail-price{font-size:24px;}
}
@media(max-width:380px){.grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

      <div class="detail-stock" id="d-stock"></div>
      <button class="wa-btn" id="d-wa-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Pedir información por WhatsApp
      </button>

<button class="fab-wa" onclick="openWA('Hola JJGaming 👋, quiero información sobre sus productos')">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</button>

<script>
const SUPABASE_URL = 'https://aahrsohdesjhuanyzdme.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHJzb2hkZXNqaHVhbnl6ZG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMTM2NzMsImV4cCI6MjA4OTc4OTY3M30.gq2i4dkBfk3TrIohV1VtOtUaXjDVTAai_cBBXPZ-xcU';
const WA_NUMBER = '18092249490';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let productos = [], activeCat = '';
const CAT_ICONS = {CPU:'🖥️',GPU:'🎮',RAM:'💾',Almacenamiento:'💿','Placa madre':'🔲','Fuente de poder':'⚡',Gabinete:'📦',Refrigeración:'❄️',Monitor:'🖥',Teclado:'⌨️',Mouse:'🖱️',Auriculares:'🎧',Laptop:'💻',Periférico:'🔌',Accesorio:'🔧',Otro:'📋'};

function fmt(n){return 'RD$'+Number(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});}
function openWA(msg){window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');}

function fixMediaUrl(url){
  if(!url||typeof url!=='string') return '';
  url=url.trim();
  // Google Drive: /file/d/ID/view
  let m=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return 'https://lh3.googleusercontent.com/d/'+m[1];
  // Google Drive: open?id=ID or uc?id=ID
  m=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m&&url.includes('drive.google')) return 'https://lh3.googleusercontent.com/d/'+m[1];
  return url;
}

async function init(){
  const{data}=await db.from('productos').select('*').eq('pub',true).gt('stock',0).order('cat');
  productos=data||[];
  renderGrid();
}

function renderGrid(){
  const q=document.getElementById('pub-search').value.toLowerCase();
  const list=productos.filter(p=>(!q||p.nombre.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q))&&(!activeCat||p.cat===activeCat));
  const allCats=[...new Set(productos.map(p=>p.cat))].sort();
  document.getElementById('filters').innerHTML=
    `<span class="chip${!activeCat?' active':''}" onclick="setCat('')">Todos</span>`
    +allCats.map(c=>`<span class="chip${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</span>`).join('');
  document.getElementById('grid').innerHTML=list.length?list.map(p=>{
    const media=p.media&&p.media.length?p.media[0]:null;
    const fixedUrl=media&&media.type!=='video'?fixMediaUrl(media.url):'';
    const thumb=media?(media.type==='video'
      ?'<div class="prod-img-placeholder">🎬</div>'
      :`<img class="prod-img" src="${fixedUrl}" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="prod-img-placeholder" style="display:none">${CAT_ICONS[p.cat]||'📋'}</div>`
    ):`<div class="prod-img-placeholder">${CAT_ICONS[p.cat]||'📋'}</div>`;
    return `<div class="prod-card" onclick="openDetail(${p.id})">
      ${thumb}
      <div class="prod-body">
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-price">${fmt(p.precio)}</div>
        <div class="prod-stock">${p.stock} disponibles</div>
      </div>
    </div>`;
  }).join(''):'<div class="empty" style="grid-column:1/-1;">No hay productos disponibles.</div>';
}

function setCat(c){activeCat=c;renderGrid();}

let currentDetailProd=null;

function openDetail(id){
  const p=productos.find(x=>x.id===id);if(!p)return;
  currentDetailProd=p;
  const media=p.media||[];

  // Gallery
  const gallery=document.getElementById('d-gallery');
  const thumbsEl=document.getElementById('d-thumbs');
  if(media.length===0){
    gallery.innerHTML=`<div class="media-main-placeholder">${CAT_ICONS[p.cat]||'📋'}</div>`;
    thumbsEl.style.display='none';
  } else {
    renderMainMedia(media[0]);
    if(media.length>1){
      thumbsEl.style.display='flex';
      thumbsEl.innerHTML=media.map((m,i)=>
        m.type==='video'
          ?`<div class="media-thumb-video${i===0?' active':''}" onclick="selectMedia(${i})" title="Video">🎬</div>`
          :`<img class="media-thumb${i===0?' active':''}" src="${m.url}" onclick="selectMedia(${i})" onerror="this.style.display='none'">`
      ).join('');
    } else {
      thumbsEl.style.display='none';
    }
  }

  document.getElementById('d-cat').textContent=p.cat;
  document.getElementById('d-name').textContent=p.nombre;
  document.getElementById('d-desc').textContent=p.descripcion||'Sin descripción disponible.';
  document.getElementById('d-price').textContent=fmt(p.precio);
  document.getElementById('d-stock').textContent=p.stock+' unidades disponibles';

  // Fix: set onclick fresh each time, no duplication
  const waBtn=document.getElementById('d-wa-btn');
  const waMsg=`Hola JJGaming 👋, estoy interesado en:

*${p.nombre}*
Precio: ${fmt(p.precio)}

¿Está disponible?`;
  waBtn.onclick=function(){openWA(waMsg);};

  document.getElementById('detail-overlay').classList.add('open');
}

function renderMainMedia(m){
  const gallery=document.getElementById('d-gallery');
  if(m.type==='video'){
    gallery.innerHTML=`<video class="media-main-video" controls autoplay muted playsinline src="${fixMediaUrl(m.url)}"></video>`;
  } else {
    gallery.innerHTML=`<img class="media-main" src="${fixMediaUrl(m.url)}" alt="Producto" onerror="this.parentElement.innerHTML='<div class=\"media-main-placeholder\">📷</div>'">`;
  }
}

function selectMedia(idx){
  if(!currentDetailProd)return;
  const media=currentDetailProd.media||[];
  if(!media[idx])return;
  renderMainMedia(media[idx]);
  document.querySelectorAll('.media-thumb,.media-thumb-video').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  // Stop any playing video
  const vid=document.querySelector('#d-gallery video');
  if(vid)vid.pause();
}
document.getElementById('detail-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('detail-overlay'))closeDetail();
});

init();
</script>
